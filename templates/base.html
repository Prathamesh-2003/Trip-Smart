<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trip Smart</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg,#1e3c72,#2a5298);
      font-family: 'Segoe UI', sans-serif;
      color: white;
    }

    .navbar {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
    }

    .glass-card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 30px;
    }

    .option-card {
      background: white;
      color: black;
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 15px;
      transition: 0.3s ease;
    }

    .option-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    .btn {
      border-radius: 10px;
    }

    footer {
      opacity: 0.7;
    }
  </style>
</head>

<body>

<nav class="navbar px-4">
  <div class="container-fluid d-flex justify-content-between align-items-center">

    <span class="navbar-brand text-white fw-bold fs-4">
      <a href="{{ url_for('mode') }}" class="text-white text-decoration-none">
        ✈ Trip Smart
      </a>
    </span>

    <div class="d-flex align-items-center gap-2">

      {% if session.get("user_id") %}

        <span class="me-3">
          Welcome, <strong>{{ session.get("name") }}</strong>
        </span>

        <a href="{{ url_for('dashboard') }}" class="btn btn-sm btn-outline-light">
          Dashboard
        </a>

        <a href="{{ url_for('my_trips') }}" class="btn btn-sm btn-outline-light">
          My Trips
        </a>

        <a href="{{ url_for('profile') }}" class="btn btn-sm btn-outline-light">
          Profile
        </a>

        <a href="{{ url_for('logout') }}" class="btn btn-sm btn-outline-light">
          Logout
        </a>

      {% else %}

        <a href="{{ url_for('login') }}" class="btn btn-sm btn-outline-light">
          Login
        </a>

        <a href="{{ url_for('signup') }}" class="btn btn-sm btn-outline-light">
          Sign Up
        </a>

      {% endif %}

    </div>
  </div>
</nav>

<div class="container py-5">
  {% block content %}{% endblock %}
</div>

<footer class="text-center pb-3">
  ❤ Trip Smart Travel Planner ❤
</footer>

</body>
</html>
