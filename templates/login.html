{% extends "base.html" %}
{% block content %}

<div class="glass-card mx-auto" style="max-width:400px;">
  <h3 class="text-center mb-4">Login</h3>

  {% if error %}
    <div class="alert alert-danger text-center">{{ error }}</div>
  {% endif %}

  <form method="post">
    <input class="form-control mb-3" name="identifier" placeholder="Username or Email" required>

    <div class="mb-3 position-relative">
      <input type="password" class="form-control" name="password" placeholder="Password" id="login_password" required>
      <span onclick="togglePassword('login_password')" style="position:absolute; right:10px; top:8px; cursor:pointer;">✈️</span>
    </div>

    <button class="btn btn-primary w-100 mb-2">Login</button>

    <div class="text-center">
      <a href="{{ url_for('forgot_password') }}">Forgot Password?</a>
    </div>
  </form>
</div>

<script>
function togglePassword(id){
  var x = document.getElementById(id);
  if (x.type === "password") {
    x.type = "text";
  } else {
    x.type = "password";
  }
}
</script>

{% endblock %}
