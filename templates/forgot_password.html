{% extends "base.html" %}
{% block content %}

<div class="glass-card mx-auto" style="max-width:400px;">
  <h3 class="text-center mb-4">Reset Password</h3>

  {% if error %}
    <div class="alert alert-danger text-center">{{ error }}</div>
  {% endif %}

  <form method="post">
    <input class="form-control mb-3" type="email" name="email" placeholder="Email" required>

    <div class="mb-3 position-relative">
      <input type="password" class="form-control" name="password" placeholder="New Password" id="new_pass" required>
      <span onclick="togglePassword('new_pass')" style="position:absolute; right:10px; top:8px; cursor:pointer;">✈️</span>
    </div>

    <div class="mb-3 position-relative">
      <input type="password" class="form-control" name="confirm_password" placeholder="Confirm Password" id="confirm_pass" required>
      <span onclick="togglePassword('confirm_pass')" style="position:absolute; right:10px; top:8px; cursor:pointer;">✈️</span>
    </div>

    <button class="btn btn-primary w-100">Reset Password</button>
  </form>
</div>

<script>
function togglePassword(id){
  var x = document.getElementById(id);
  if (x.type === "password") {
    x.type = "text";
  } else {
    x.type = "password";
  }
}
</script>

{% endblock %}
